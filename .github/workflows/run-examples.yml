name: Run autodiff examples

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  run-examples:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements_pip.txt

      - name: Install dependencies
        run: pip install -r requirements_pip.txt

      - name: Run num-dual example
        working-directory: python
        run: python neo-hooke-example.py --backend num-dual

      - name: Run autograd example
        working-directory: python
        run: python neo-hooke-example.py --backend autograd

      - name: Run JAX example
        working-directory: python
        run: python neo-hooke-example.py --backend jax

      - name: Run PyTorch example
        working-directory: python
        run: python neo-hooke-example.py --backend pytorch
